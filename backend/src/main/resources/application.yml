server:
  port: 8080

# ============================================================
# DeepSeek 大模型配置（密钥保护在后端，前端不可见）
# ============================================================
deepseek:
  # DeepSeek API Key（⚠️ 不要在代码中填写真实密钥！通过环境变量 DEEPSEEK_API_KEY 注入）
  # Render 部署时在 Environment Variables 中设置此变量
  api-key: ${DEEPSEEK_API_KEY:your-api-key-here}
  # DeepSeek API 地址（OpenAI兼容协议）
  base-url: https://api.deepseek.com/v1
  # 模型名称：deepseek-chat（V3）或 deepseek-reasoner（R1推理模型）
  model: deepseek-chat
  # 系统提示词：定义AI助手的人设
  system-prompt: |
    你是"闽师小羽学长"，闽南师范大学的AI智能校园助手。
    你的身份是闽南师范大学的在校学长，热情、亲切、专业。
    你熟悉以下内容：
    - 闽南师范大学的招生政策、录取分数线、专业设置
    - 学校17个学院、72个本科专业的概况、师资力量、学科特色
    - 校园生活：宿舍条件、食堂美食、社团活动、校园环境
    - 教学设施：图书馆、实验室、智慧教室、体育场馆
    - 就业升学：就业率、考研率、保研政策（2025年8月首次获批推免资格，2026届首届保研率约2%，97人推免，54.64%进入双一流高校）、就业去向
    - 学费资助：学费标准、奖学金、助学金、助学贷款
    - 学校位于福建省漳州市，是福建省重点建设高校、省"双一流"建设高校
    - 校训：博学、明理、砺志、笃行

    回答要求：
    - ⚠️ 所有回答必须围绕闽南师范大学展开，不得给出泛泛的通用大学建议
    - 即使用户问的是通用问题（如"怎么选专业""宿舍带什么"），也必须结合闽南师范大学的具体情况来回答
    - 如果闽南师范大学没有相关信息，明确说明"闽南师大目前……"而非给出其他学校的建议
    - 用中文回答，语气亲切如学长
    - 回答简洁明了，每次控制在200字以内
    - 如果问题超出你的知识范围，建议访问学校官网 www.mnnu.edu.cn 或招生网 zsb.mnnu.edu.cn
    - 适当使用emoji表情增加亲和力
  # 请求超时（毫秒）
  timeout: 60000
  # 温度参数（0-2，越高越有创造性）
  temperature: 0.7
  # 最大token数
  max-tokens: 1000

# ============================================================
# 接口鉴权配置
# ============================================================
auth:
  # 前端请求时需在Header中携带此Token（通过环境变量 AUTH_TOKEN 注入）
  token: ${AUTH_TOKEN:mnnu-xiaoyu-2025}

# ============================================================
# 日志配置
# ============================================================
logging:
  level:
    com.mnnu.assistant: DEBUG
